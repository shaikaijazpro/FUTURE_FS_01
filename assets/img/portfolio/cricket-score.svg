<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1f2d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <!-- Grid -->
  <g opacity="0.06" stroke="#ff4d4f" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
  </g>
  <!-- Chart area -->
  <g transform="translate(100,60)">
    <!-- Y-axis -->
    <line x1="60" y1="20" x2="60" y2="320" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <!-- X-axis -->
    <line x1="60" y1="320" x2="680" y2="320" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <!-- Y labels -->
    <text x="50" y="35" font-family="monospace" font-size="10" fill="#999" text-anchor="end">350</text>
    <text x="50" y="110" font-family="monospace" font-size="10" fill="#999" text-anchor="end">280</text>
    <text x="50" y="185" font-family="monospace" font-size="10" fill="#999" text-anchor="end">210</text>
    <text x="50" y="255" font-family="monospace" font-size="10" fill="#999" text-anchor="end">140</text>
    <text x="50" y="325" font-family="monospace" font-size="10" fill="#999" text-anchor="end">70</text>
    <!-- Grid lines -->
    <line x1="60" y1="95" x2="680" y2="95" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>
    <line x1="60" y1="170" x2="680" y2="170" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>
    <line x1="60" y1="245" x2="680" y2="245" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>
    <!-- Prediction line (actual) -->
    <polyline points="80,280 140,250 200,220 260,180 320,200 380,150 440,120 500,140 560,90 620,110" fill="none" stroke="#ff4d4f" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Prediction line (model) -->
    <polyline points="80,275 140,240 200,230 260,190 320,195 380,160 440,130 500,145 560,100 620,115" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="6,3" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="80" cy="280" r="4" fill="#ff4d4f"/>
    <circle cx="140" cy="250" r="4" fill="#ff4d4f"/>
    <circle cx="200" cy="220" r="4" fill="#ff4d4f"/>
    <circle cx="260" cy="180" r="4" fill="#ff4d4f"/>
    <circle cx="320" cy="200" r="4" fill="#ff4d4f"/>
    <circle cx="380" cy="150" r="4" fill="#ff4d4f"/>
    <circle cx="440" cy="120" r="4" fill="#ff4d4f"/>
    <circle cx="500" cy="140" r="4" fill="#ff4d4f"/>
    <circle cx="560" cy="90" r="4" fill="#ff4d4f"/>
    <circle cx="620" cy="110" r="4" fill="#ff4d4f"/>
    <!-- X labels -->
    <text x="80" y="340" font-family="monospace" font-size="9" fill="#999" text-anchor="middle">M1</text>
    <text x="200" y="340" font-family="monospace" font-size="9" fill="#999" text-anchor="middle">M3</text>
    <text x="320" y="340" font-family="monospace" font-size="9" fill="#999" text-anchor="middle">M5</text>
    <text x="440" y="340" font-family="monospace" font-size="9" fill="#999" text-anchor="middle">M7</text>
    <text x="560" y="340" font-family="monospace" font-size="9" fill="#999" text-anchor="middle">M9</text>
  </g>
  <!-- Legend -->
  <g transform="translate(520,70)">
    <rect x="0" y="0" width="180" height="55" rx="8" fill="#1c1c1c" opacity="0.8" stroke="#333" stroke-width="1"/>
    <line x1="15" y1="18" x2="40" y2="18" stroke="#ff4d4f" stroke-width="2.5"/>
    <text x="48" y="22" font-family="sans-serif" font-size="11" fill="#ccc">Actual Score</text>
    <line x1="15" y1="38" x2="40" y2="38" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="48" y="42" font-family="sans-serif" font-size="11" fill="#ccc">Predicted Score</text>
  </g>
  <!-- Cricket ball icon -->
  <g transform="translate(710,420)" opacity="0.3">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#ff4d4f" stroke-width="1.5"/>
    <path d="M-14,-14 C-5,-5 5,-5 14,-14" fill="none" stroke="#ff4d4f" stroke-width="1"/>
    <path d="M-14,14 C-5,5 5,5 14,14" fill="none" stroke="#ff4d4f" stroke-width="1"/>
  </g>
  <!-- Title -->
  <text x="400" y="440" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">Cricket Score Prediction</text>
  <text x="400" y="465" font-family="sans-serif" font-size="14" fill="#4fc3f7" text-anchor="middle" opacity="0.7">scikit-learn · pandas · Python</text>
  <!-- RMSE badge -->
  <g transform="translate(120,420)">
    <rect x="-55" y="-15" width="110" height="30" rx="15" fill="#4fc3f7" opacity="0.12" stroke="#4fc3f7" stroke-width="1"/>
    <text x="0" y="5" font-family="monospace" font-size="12" fill="#4fc3f7" text-anchor="middle" font-weight="bold">RMSE: 12.4</text>
  </g>
</svg>