<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)"/>
  <!-- Document (left) -->
  <g transform="translate(80,60)">
    <rect x="0" y="0" width="250" height="340" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
    <!-- Document header -->
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#252525"/>
    <rect x="0" y="20" width="250" height="15" fill="#252525"/>
    <circle cx="15" cy="17" r="4" fill="#ff5f57"/>
    <circle cx="28" cy="17" r="4" fill="#febc2e"/>
    <circle cx="41" cy="17" r="4" fill="#28c840"/>
    <text x="125" y="22" font-family="sans-serif" font-size="9" fill="#999" text-anchor="middle">research_paper.pdf</text>
    <!-- Text lines -->
    <rect x="20" y="50" width="180" height="6" rx="3" fill="#444"/>
    <rect x="20" y="65" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="77" width="195" height="4" rx="2" fill="#333"/>
    <rect x="20" y="89" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="101" width="160" height="4" rx="2" fill="#333"/>
    <rect x="20" y="120" width="140" height="6" rx="3" fill="#444"/>
    <rect x="20" y="135" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="147" width="190" height="4" rx="2" fill="#333"/>
    <rect x="20" y="159" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="171" width="180" height="4" rx="2" fill="#333"/>
    <rect x="20" y="183" width="200" height="4" rx="2" fill="#333"/>
    <rect x="20" y="202" width="120" height="6" rx="3" fill="#444"/>
    <rect x="20" y="217" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="229" width="195" height="4" rx="2" fill="#333"/>
    <rect x="20" y="241" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="253" width="175" height="4" rx="2" fill="#333"/>
    <rect x="20" y="265" width="200" height="4" rx="2" fill="#333"/>
    <rect x="20" y="284" width="130" height="6" rx="3" fill="#444"/>
    <rect x="20" y="299" width="210" height="4" rx="2" fill="#333"/>
    <rect x="20" y="311" width="190" height="4" rx="2" fill="#333"/>
    <!-- Highlighted sections -->
    <rect x="18" y="48" width="184" height="10" rx="2" fill="#ff4d4f" opacity="0.1"/>
    <rect x="18" y="118" width="144" height="10" rx="2" fill="#ff4d4f" opacity="0.1"/>
    <rect x="18" y="200" width="124" height="10" rx="2" fill="#ff4d4f" opacity="0.1"/>
    <!-- Label -->
    <text x="125" y="355" font-family="sans-serif" font-size="11" fill="#999" text-anchor="middle">Original Paper</text>
  </g>
  <!-- Arrow / processing -->
  <g transform="translate(370,180)">
    <!-- AI processing icon -->
    <rect x="-25" y="-25" width="50" height="50" rx="25" fill="#ff4d4f" opacity="0.15" stroke="#ff4d4f" stroke-width="1.5"/>
    <text x="0" y="6" font-family="sans-serif" font-size="16" fill="#ff4d4f" text-anchor="middle" font-weight="bold">AI</text>
    <!-- Arrows -->
    <line x1="-50" y1="0" x2="-30" y2="0" stroke="#ff4d4f" stroke-width="1.5" opacity="0.5"/>
    <polygon points="-30,-4 -22,0 -30,4" fill="#ff4d4f" opacity="0.5"/>
    <line x1="30" y1="0" x2="50" y2="0" stroke="#ff4d4f" stroke-width="1.5" opacity="0.5"/>
    <polygon points="50,-4 58,0 50,4" fill="#ff4d4f" opacity="0.5"/>
    <!-- NLP label -->
    <text x="0" y="45" font-family="monospace" font-size="9" fill="#ff4d4f" text-anchor="middle" opacity="0.7">NLP Processing</text>
  </g>
  <!-- Summary (right) -->
  <g transform="translate(470,80)">
    <rect x="0" y="0" width="250" height="280" rx="8" fill="#1c1c1c" stroke="#ff4d4f" stroke-width="1" opacity="0.9"/>
    <!-- Summary header -->
    <rect x="0" y="0" width="250" height="35" rx="8" fill="rgba(255,77,79,0.1)"/>
    <rect x="0" y="20" width="250" height="15" fill="rgba(255,77,79,0.1)"/>
    <text x="125" y="23" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ff4d4f" text-anchor="middle">Summary</text>
    <!-- Key insight 1 -->
    <g transform="translate(20,55)">
      <circle cx="5" cy="3" r="3" fill="#ff4d4f"/>
      <rect x="15" y="0" width="195" height="5" rx="2" fill="#ff4d4f" opacity="0.4"/>
      <rect x="15" y="12" width="170" height="4" rx="2" fill="#666"/>
      <rect x="15" y="22" width="185" height="4" rx="2" fill="#666"/>
    </g>
    <!-- Key insight 2 -->
    <g transform="translate(20,105)">
      <circle cx="5" cy="3" r="3" fill="#ff4d4f"/>
      <rect x="15" y="0" width="180" height="5" rx="2" fill="#ff4d4f" opacity="0.4"/>
      <rect x="15" y="12" width="195" height="4" rx="2" fill="#666"/>
      <rect x="15" y="22" width="160" height="4" rx="2" fill="#666"/>
    </g>
    <!-- Key insight 3 -->
    <g transform="translate(20,155)">
      <circle cx="5" cy="3" r="3" fill="#ff4d4f"/>
      <rect x="15" y="0" width="190" height="5" rx="2" fill="#ff4d4f" opacity="0.4"/>
      <rect x="15" y="12" width="175" height="4" rx="2" fill="#666"/>
      <rect x="15" y="22" width="195" height="4" rx="2" fill="#666"/>
    </g>
    <!-- Confidence meter -->
    <rect x="20" y="220" width="210" height="30" rx="6" fill="#252525"/>
    <text x="30" y="240" font-family="sans-serif" font-size="9" fill="#999">Confidence</text>
    <rect x="100" y="233" width="120" height="6" rx="3" fill="#333"/>
    <rect x="100" y="233" width="108" height="6" rx="3" fill="#4caf50"/>
    <text x="228" y="240" font-family="monospace" font-size="9" fill="#4caf50">92%</text>
    <!-- Label -->
    <text x="125" y="295" font-family="sans-serif" font-size="11" fill="#999" text-anchor="middle">Generated Summary</text>
  </g>
  <!-- Title -->
  <text x="400" y="440" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">AI Research Paper Summarizer</text>
  <text x="400" y="465" font-family="sans-serif" font-size="14" fill="#ff7875" text-anchor="middle" opacity="0.7">Python · NLP · Flask</text>
  <!-- Floating particles -->
  <g opacity="0.1">
    <circle cx="50" cy="80" r="3" fill="#ff4d4f"/>
    <circle cx="750" cy="120" r="2" fill="#ff4d4f"/>
    <circle cx="400" cy="400" r="4" fill="#ff4d4f"/>
    <circle cx="100" cy="450" r="2" fill="#ff4d4f"/>
    <circle cx="700" cy="400" r="3" fill="#ff4d4f"/>
  </g>
</svg>